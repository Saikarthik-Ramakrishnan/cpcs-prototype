name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps (logic tests stub cv2/ultralytics)
        run: pip install pytest pyyaml
      - name: Run test suite
        run: python -m pytest tests/ -q
